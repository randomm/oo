name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  format:
    name: Format
    runs-on: ubicloud-standard-4

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --check

  clippy:
    name: Clippy
    runs-on: ubicloud-standard-4
    needs: format

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy -- -D warnings

  test:
    name: Test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubicloud-standard-4
            rust: stable
          - os: macos-latest
            rust: stable
          - os: ubicloud-standard-4
            rust: "1.85"
    runs-on: ${{ matrix.os }}
    needs: format

    steps:
      - uses: actions/checkout@v4
      # @master is required when using dynamic toolchain input
      # dtolnay/rust-toolchain uses branch names for action versions,
      # and the toolchain input specifies the Rust version
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
      - uses: Swatinem/rust-cache@v2
      - run: cargo test

  tarpaulin:
    name: Coverage
    runs-on: ubicloud-standard-4
    needs: format

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@cargo-tarpaulin
      - run: cargo tarpaulin --fail-under 70 --timeout 120 --skip-clean --exclude-files src/main.rs

  audit:
    name: Security Audit
    runs-on: ubicloud-standard-4

    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
